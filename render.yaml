services:
  - type: web
    name: myshubhlife-voicebot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir functions server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    healthCheckPath: /health
    envVars:
      # Set the actual values in the Render dashboard (Environment tab),
      # NOT here — sync:false keeps secrets out of git.
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
